<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL Challenge — Node Tree Processor</title>
  <meta name="description" content="Processes node strings into tree hierarchies with cycle detection. BFHL full-stack REST API challenge." />
  <style>
    /* ─── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --green:     #58d68d;
      --blue:      #79c0ff;
      --red:       #f85149;
      --amber:     #e3b341;
      --orange:    #f0883e;
      --accent:    #58d68d;
      --radius:    8px;
      --mono:      'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ─── Animations ───────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ─── Header ───────────────────────────────────── */
    header {
      background: #010409;
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.04em;
    }

    header h1 span {
      color: var(--blue);
    }

    header p {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ─── Main layout ──────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ─── Card ─────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    /* ─── Input section ────────────────────────────── */
    .input-section label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }

    #node-input {
      width: 100%;
      min-height: 140px;
      background: #010409;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: var(--mono);
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    #node-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(121, 192, 255, 0.1);
    }

    #node-input::placeholder { color: #444c56; }

    .btn-row {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #submit-btn {
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.4rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, opacity 0.2s, transform 0.1s;
    }

    #submit-btn:hover:not(:disabled) {
      background: #4caf74;
      transform: translateY(-1px);
    }

    #submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: pulse 1.2s ease-in-out infinite;
    }

    #submit-btn:active:not(:disabled) { transform: translateY(0); }

    .hint {
      font-size: 11px;
      color: var(--muted);
    }

    /* ─── Error banner ─────────────────────────────── */
    #error-banner {
      display: none;
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.4);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: var(--red);
      font-size: 0.82rem;
      animation: fadeUp 0.2s ease;
    }

    #error-banner strong { display: block; margin-bottom: 2px; }

    /* ─── Results section ──────────────────────────── */
    #results {
      display: none;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ─── Identity strip ───────────────────────────── */
    .identity-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      padding: 0.6rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 11px;
      color: var(--muted);
    }

    .identity-strip span b { color: var(--blue); }

    /* ─── Summary cards ────────────────────────────── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
      animation: fadeUp 0.3s ease both;
    }

    .metric-card .metric-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.35rem;
    }

    .metric-card .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* ─── Section heading ──────────────────────────── */
    .section-heading {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
      margin-bottom: 0.75rem;
    }

    /* ─── Hierarchy grid ───────────────────────────── */
    .hierarchies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.75rem;
    }

    .hier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      animation: fadeUp 0.35s ease both;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .hier-card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .root-label {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
    }

    /* ─── Badges ───────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: 0.03em;
    }

    .badge-cyclic  { background: rgba(248, 81, 73, 0.2);  color: var(--red);    border: 1px solid rgba(248, 81, 73, 0.4); }
    .badge-depth   { background: rgba(121, 192, 255, 0.15); color: var(--blue);   border: 1px solid rgba(121, 192, 255, 0.3); }
    .badge-invalid { background: rgba(240, 136, 62, 0.2);  color: var(--orange); border: 1px solid rgba(240, 136, 62, 0.4); }
    .badge-dupe    { background: rgba(227, 179, 65, 0.2);  color: var(--amber);  border: 1px solid rgba(227, 179, 65, 0.4); }
    .badge-none    { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    /* ─── Tree pre ─────────────────────────────────── */
    .tree-pre {
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      font-size: 12px;
      color: var(--text);
      white-space: pre;
      overflow-x: auto;
      margin: 0;
      line-height: 1.7;
    }

    .tree-pre .node-bullet { color: var(--blue); }
    .no-structure { color: var(--muted); font-style: italic; }

    /* ─── Pill rows ────────────────────────────────── */
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    /* ─── Responsive ───────────────────────────────── */
    @media (max-width: 600px) {
      .summary-row { grid-template-columns: 1fr 1fr; }
      .summary-row .metric-card:last-child { grid-column: span 2; }
      header { padding: 1rem; }
      main { padding: 1rem 0.75rem 3rem; }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ─────────────────────────────────────── -->
  <header>
    <h1>BFHL<span>Challenge</span></h1>
    <p>Node string → tree hierarchy processor · cycle detection · REST API</p>
  </header>

  <!-- ─── MAIN ───────────────────────────────────────── -->
  <main>

    <!-- INPUT SECTION -->
    <section class="card input-section" aria-label="Input">
      <label for="node-input">Enter node strings (one per line or comma-separated)</label>
      <textarea
        id="node-input"
        spellcheck="false"
        autocorrect="off"
        placeholder="A->B&#10;A->C&#10;B->D&#10;X->Y, Y->X&#10;hello, 1->2"
      ></textarea>
      <div class="btn-row">
        <button id="submit-btn">Submit</button>
        <span class="hint">Splits on newlines &amp; commas automatically</span>
      </div>
    </section>

    <!-- ERROR BANNER -->
    <div id="error-banner" role="alert" aria-live="polite">
      <strong id="error-title">Request failed</strong>
      <span id="error-msg"></span>
    </div>

    <!-- RESULTS -->
    <section id="results" aria-label="Results">

      <!-- A. Identity strip -->
      <div class="identity-strip" id="identity-strip"></div>

      <!-- B. Summary cards -->
      <div>
        <div class="section-heading">Summary</div>
        <div class="summary-row" id="summary-row"></div>
      </div>

      <!-- C. Hierarchies -->
      <div>
        <div class="section-heading">Hierarchies</div>
        <div class="hierarchies-grid" id="hierarchies-grid"></div>
      </div>

      <!-- D. Invalid entries -->
      <div class="card">
        <div class="section-heading">Invalid entries</div>
        <div class="pill-row" id="invalid-pills"></div>
      </div>

      <!-- E. Duplicate edges -->
      <div class="card">
        <div class="section-heading">Duplicate edges</div>
        <div class="pill-row" id="dupe-pills"></div>
      </div>

    </section>
  </main>

  <script>
    // ─── CONFIG ────────────────────────────────────────
    const BASE_URL = "https://bfhl-api.onrender.com";

    // ─── DOM refs ──────────────────────────────────────
    const textarea       = document.getElementById('node-input');
    const submitBtn      = document.getElementById('submit-btn');
    const errorBanner    = document.getElementById('error-banner');
    const errorTitle     = document.getElementById('error-title');
    const errorMsg       = document.getElementById('error-msg');
    const resultsSection = document.getElementById('results');
    const identityStrip  = document.getElementById('identity-strip');
    const summaryRow     = document.getElementById('summary-row');
    const hierarchiesGrid= document.getElementById('hierarchies-grid');
    const invalidPills   = document.getElementById('invalid-pills');
    const dupePills      = document.getElementById('dupe-pills');

    // ─── TREE RENDERER ─────────────────────────────────
    function renderTree(node, obj, depth = 0) {
      let html = '';
      const indent = '  '.repeat(depth);
      html += `${indent}<span class="node-bullet">●</span> ${escHtml(node)}\n`;
      for (const [child, subtree] of Object.entries(obj)) {
        html += renderTree(child, subtree, depth + 1);
      }
      return html;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ─── HELPERS ───────────────────────────────────────
    function badge(text, cls) {
      return `<span class="badge ${cls}">${escHtml(String(text))}</span>`;
    }

    function metricCard(value, label, delay = 0) {
      return `
        <div class="metric-card" style="animation-delay:${delay}ms">
          <div class="metric-value">${escHtml(String(value ?? '—'))}</div>
          <div class="metric-label">${label}</div>
        </div>`;
    }

    function pillList(arr, badgeClass) {
      if (!arr || arr.length === 0) return badge('none', 'badge-none');
      return arr.map(v => badge(v, badgeClass)).join(' ');
    }

    // ─── SHOW / HIDE UI STATE ─────────────────────────
    function showError(title, message) {
      errorTitle.textContent = title;
      errorMsg.textContent   = message;
      errorBanner.style.display = 'block';
    }

    function hideError() {
      errorBanner.style.display = 'none';
    }

    function showResults() {
      resultsSection.style.display = 'flex';
    }

    function hideResults() {
      resultsSection.style.display = 'none';
    }

    // ─── RENDER RESPONSE ──────────────────────────────
    function renderResponse(data) {
      // A. Identity strip
      identityStrip.innerHTML = `
        <span><b>user_id</b> ${escHtml(data.user_id)}</span>
        <span><b>email</b> ${escHtml(data.email_id)}</span>
        <span><b>roll</b> ${escHtml(data.college_roll_number)}</span>`;

      // B. Summary cards
      const s = data.summary || {};
      summaryRow.innerHTML =
        metricCard(s.total_trees,       'Total Trees',        0)  +
        metricCard(s.total_cycles,      'Total Cycles',       60) +
        metricCard(s.largest_tree_root, 'Largest Tree Root',  120);

      // C. Hierarchies
      hierarchiesGrid.innerHTML = '';
      const hiers = data.hierarchies || [];
      if (hiers.length === 0) {
        hierarchiesGrid.innerHTML = `<span style="color:var(--muted);font-size:12px;">No hierarchies returned.</span>`;
      } else {
        hiers.forEach((h, i) => {
          const card = document.createElement('div');
          card.className = 'hier-card';
          card.style.animationDelay = `${i * 50}ms`;

          // Header: root label + badges
          let headerHTML = `<div class="hier-card-header">
            <span class="root-label">${escHtml(h.root)}</span>`;
          if (h.has_cycle) {
            headerHTML += badge('CYCLIC', 'badge-cyclic');
          }
          if (h.depth !== undefined) {
            headerHTML += badge(`depth: ${h.depth}`, 'badge-depth');
          }
          headerHTML += `</div>`;

          // Tree body
          const treeObj = h.tree && typeof h.tree === 'object' ? h.tree : {};
          const rootKeys = Object.keys(treeObj);

          let treeHTML;
          if (h.has_cycle || rootKeys.length === 0) {
            treeHTML = `<pre class="tree-pre"><span class="no-structure">no structure (cycle)</span></pre>`;
          } else {
            let inner = '';
            for (const [rootNode, subtree] of Object.entries(treeObj)) {
              inner += renderTree(rootNode, subtree, 0);
            }
            treeHTML = `<pre class="tree-pre">${inner.trimEnd()}</pre>`;
          }

          card.innerHTML = headerHTML + treeHTML;
          hierarchiesGrid.appendChild(card);
        });
      }

      // D. Invalid entries
      invalidPills.innerHTML = pillList(data.invalid_entries, 'badge-invalid');

      // E. Duplicate edges
      dupePills.innerHTML = pillList(data.duplicate_edges, 'badge-dupe');

      showResults();
    }

    // ─── SUBMIT HANDLER ────────────────────────────────
    submitBtn.addEventListener('click', async () => {
      // Parse input — split on newlines AND commas, trim, filter empty
      const raw   = textarea.value;
      const items = raw
        .split(/[\n,]+/)
        .map(s => s.trim())
        .filter(s => s.length > 0);

      // Reset UI
      hideError();
      hideResults();
      submitBtn.textContent = 'Processing…';
      submitBtn.disabled    = true;

      try {
        const resp = await fetch(`${BASE_URL}/bfhl`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ data: items }),
        });

        if (!resp.ok) {
          let errText = '';
          try { errText = (await resp.json()).error || resp.statusText; }
          catch { errText = resp.statusText; }
          showError(`Error ${resp.status}`, errText);
        } else {
          const data = await resp.json();
          renderResponse(data);
        }
      } catch (err) {
        showError('Network error', err.message || 'Could not reach the server.');
      } finally {
        submitBtn.textContent = 'Submit';
        submitBtn.disabled    = false;
      }
    });

    // Allow Ctrl+Enter to submit
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        submitBtn.click();
      }
    });
  </script>
</body>
</html>
